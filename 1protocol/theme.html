<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테마 선택</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: sans-serif; text-align: center; margin: 40px; }
    .theme-btn {
      display: inline-block;
      margin: 8px;
      padding: 12px 25px;
      border: 1px solid #aaa;
      border-radius: 8px;
      cursor: pointer;
      background-color: white;
    }
    .theme-btn.selected {
      background-color: #007bff;
      color: white;
    }
    #submit-btn {
      display: block;
      margin: 50px auto 0;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      background-color: #28a745;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>원하는 테마를 선택하세요</h1>

  <div id="theme-container">
    <button class="theme-btn">미니멀</button>
    <button class="theme-btn">모던</button>
    <button class="theme-btn">비즈니스</button>
    <button class="theme-btn">아트</button>
    <button class="theme-btn">다크</button>
    <button class="theme-btn">밝은 톤</button>
    <button class="theme-btn">컬러풀</button>
  </div>

  <button id="submit-btn">해당 테마로 포트폴리오 만들기</button>

  <script>
    const themeBtns = document.querySelectorAll(".theme-btn");
    const submitBtn = document.getElementById("submit-btn");

    themeBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        btn.classList.toggle("selected");
      });
    });

    submitBtn.addEventListener("click", () => {
      const selected = Array.from(themeBtns)
        .filter(btn => btn.classList.contains("selected"))
        .map(btn => btn.textContent);
      
      if (selected.length === 0) {
        alert("최소 하나의 테마를 선택해주세요!");
      } else {
        window.location.href = "portfolio.html";
      }
    });
  </script>
</body>
</html>
