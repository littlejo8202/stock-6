<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>설문 시작</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    .hidden { display: none; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>간단한 설문</h1>

  <div id="start-section">
    <button id="start-btn">설문 시작</button>
  </div>

  <div id="survey-section" class="hidden">
    <p>당신은 주식 투자에서 감수 가능한 위험도는?.</p>
    <div>
      <button class="score-btn">원금의 100%보장 희망</button>
      <button class="score-btn">원금의 80%보장 희망</button>
      <button class="score-btn">원금의 60%보장 희망</button>
      <button class="score-btn">원금의 40%보장 희망</button>
      <button class="score-btn">원금의 20%보장 희망</button>
    </div>
  </div>

  <div id="result-section" class="hidden">
    <h2 id="result-text"></h2>
    <button id="next-btn">다음으로</button>
  </div>

  <script>
    const startBtn = document.getElementById("start-btn");
    const surveySection = document.getElementById("survey-section");
    const resultSection = document.getElementById("result-section");
    const resultText = document.getElementById("result-text");
    const nextBtn = document.getElementById("next-btn");
    const scoreBtns = document.querySelectorAll(".score-btn");

    startBtn.addEventListener("click", () => {
      startBtn.parentElement.classList.add("hidden");
      surveySection.classList.remove("hidden");
    });

    scoreBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const score = btn.textContent;
        surveySection.classList.add("hidden");
        resultSection.classList.remove("hidden");
        resultText.textContent = `당신은 ${score}점입니다.`;
      });
    });

    nextBtn.addEventListener("click", () => {
      window.location.href = "theme.html";
    });
  </script>
</body>
</html>
